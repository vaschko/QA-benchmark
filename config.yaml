# ============================================================================
# QA-Benchmark Konfiguration
# ============================================================================
# Es werden drei Modell-Rollen unterschieden:
#   strong      -> generiert Fragen und bewertet Antworten (Judge)
#   summarizer  -> DAS getestete Modell: erzeugt die Zusammenfassung
#   answerer    -> beantwortet Fragen; MUSS in beiden Bedingungen identisch sein
#
# provider: "ollama" (lokal) oder "anthropic" (Claude-API). Ein Wechsel ist
# eine einzige Zeile -- der Rest der Pipeline bleibt unberührt.
# ============================================================================

models:
  strong:
    provider: ollama
    model: qwen3.6:35b-a3b-q4_K_M
    options:
      temperature: 0.2
      num_ctx: 32768
    # --- Alternative: Claude-API ---
    # provider: anthropic
    # model: claude-opus-4-8
    # api_key_env: ANTHROPIC_API_KEY
    # options:
    #   temperature: 0.2
    #   max_tokens: 2000

  summarizer:
    provider: ollama
    model: qwen3.5:4b
    options:
      temperature: 0.3
      num_ctx: 32768
    # --- Alternative: OpenAI-API (needs OPENAI_API_KEY) ---
    #provider: openai
    #model: gpt-5.5
    #api_key_env: OPENAI_API_KEY   # optional; this is the default for openai

  answerer:
     provider: ollama
     model: qwen3.6:35b-a3b-q4_K_M
     options:
       temperature: 0.0
       num_ctx: 32768
    # --- OpenAI-API (needs OPENAI_API_KEY) ---
    #provider: openai
    #model: gpt-5.5
    #api_key_env: OPENAI_API_KEY

questions:
  count: 50
  # Controls the variety of the generated questions
  types: [factual, numeric, inferential]
  # Was die Fragen abfragen:
  #   detailed -> konkrete Fakten/Zahlen/Namen (feingranularer Recall)
  #   material -> die Kerninhalte, die eine treue Summary behalten MUSS
  #               (Pflichten, Rechte, Fristen, Haftung) statt Trivia
  # Pro Lauf ueberschreibbar mit --focus; beide Sets werden separat gecacht.
  focus: detailed

summary:
  mode: generate        # generate | file
  target_words: 300     # nur relevant bei mode=generate

answering:
  closed_book_baseline: true   # jede Frage zusätzlich OHNE Kontext -> Kontaminationscheck
  require_evidence: true       # Modell muss ein Beleg-Zitat liefern
  max_context_chars: 90000     # längere Dokumente werden abgeschnitten (Warnung im Report)
  # Referenz-Antwort (Ground Truth) gegen das Original:
  #   full    -> ganzes Dokument (klassisch; kann lange Docs abschneiden)
  #   section -> nur die eigene Section (+ Preamble) mit Volltext-Fallback,
  #              spart Tokens und vermeidet Truncation (braucht sections.enabled)
  context_scope: section

judge:
  # Mögliche Urteile; das stärkere Modell ordnet jede Antwort genau einem zu.
  scale: [match, partial, mismatch]

run:
  output_dir: runs

# Robustes, deterministisches Aufteilen eines Dokuments in Sections.
# Versucht mehrere Heading-Konventionen (markdown / numbered / keyword / roman /
# allcaps) und faellt sonst auf Absatz-Chunking zurueck -- es geht nie etwas
# verloren. Inspizieren mit:  python -m qabench sections -d <doc>
sections:
  enabled: true          # Fragen pro Section erzeugen + Pro-Section-Retention-Score
  min_headings: 2        # so viele Headings muss eine Strategie finden, sonst naechste
  max_chunk_chars: 6000  # Zielgroesse einer Section beim Absatz-Fallback
  keep_preamble: true    # Text vor dem ersten Heading als "Preamble" behalten
  per_section_min_chars: 200  # kuerzere Sections werden bei der Fragegenerierung uebersprungen
  max_depth: 1           # nur oberste Nummerierungsebene splitten (1=top-level, 2=+Subsections, 0=alle)
